<html>
	<body> 
		<form id="form">
			<div>
				这是一个受密码保护的界面。</br> 
				输入密码以进入正确的页面。</br> 
				请输入密码：<input type="text" name="password"></br>
				<button name="goit" type="button" onclick="go()">确定</button></br>
			</div>
			<script>
				function getRequest(key){
				    var url=location.search;  
				    var theRequest=new Object();
				    if (url.indexOf("?")!=-1){
				        var str=url.substr(1);
				        strs=str.split("&");
				        for (var i=0;i<strs.length;i++){
				        	theRequest[strs[i].split("=")[0]]=unescape(strs[i].split("=")[1]);
				        }
				    }
				    var value=theRequest[key];
				    return value;
				}
				function go(){
					var now=document.getElementById('form');
					var s="https://crystal203.github.io/secret/"+getRequest("attend")+now.password.value+".md";
					window.location.assign(s);
				}
			</script> 
		</form>
	</body>
</html>
